    function isQuotaExceededError(error){
      if(!error) return false;

    function money(n){ return new Intl.NumberFormat('en-US',{ style:'currency', currency: getSettings().currencyCode || 'USD', minimumFractionDigits:2 }).format(Number(n||0)); }
function formatDateTime(value){

      return (state.orders || []).filter(function(order){

      const labels = pilotTableLabelsForContext(serviceContext, businessUnit);
      const occupied = new Set(occupiedPilotTableIds(serviceContext, businessUnit, ignoreOrderId));
      return labels.filter(function(id){ return !occupied.has(id) || id === selectedId; }).map(function(id){ return { id:id, name:id }; });

    function legacyPinDigest(pin, salt){
      const input = String(salt || 'ppos') + '::' + String(pin || '');
      let h1 = 0xdeadbeef ^ input.length, h2 = 0x41c6ce57 ^ input.length;
      for(let i = 0, ch; i < input.length; i++){
        ch = input.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return ((4294967296 * (2097151 & h2)) + (h1 >>> 0)).toString(16);
    }
    function userPinSalt(user){ return String(user && (user.pinSalt || user.id || user.name) || 'ppos-user'); }
    function userHasPlainPin(user){ return !!(user && Object.prototype.hasOwnProperty.call(user, 'pin')); }
    function userPinAccepted(user, pin){
      if(!user) return false;
      const candidate = String(pin || '');
      if(user.pinHash) return user.pinHash === legacyPinDigest(candidate, userPinSalt(user));
      if(userHasPlainPin(user)) return String(user.pin || '') === candidate;
      return false;
    }
    function normalizeUserAuthRecord(user){
      const next = Object.assign({}, user || {});
      if(!next.id) next.id = 'usr_' + normalizeNameKey(next.name || 'user');
      if(!next.username) next.username = normalizeNameKey(next.username || next.name || next.id || 'user');
      if(!next.pinSalt) next.pinSalt = next.id;
      if(!next.role) next.role = 'cashier';
      if(!next.department){
        const departmentByRole = { manager:'admin', admin:'admin', supervisor:'restaurant', cashier:'restaurant', waiter:'restaurant', kitchen:'kitchen', bar:'bar', butchery:'butchery' };
        next.department = departmentByRole[next.role] || 'restaurant';
      }
      if(!next.defaultView){
        const defaultViewByRole = { admin:'control_panel', manager:'management_bi', supervisor:'todayOps', cashier:'pos', waiter:'pos', kitchen:'kds', bar:'bar', butchery:'butchery' };
        next.defaultView = defaultViewByRole[next.role] || 'admin_center';
      }
      if(!next.pinHash){
        const sourcePin = userHasPlainPin(next) ? String(next.pin || '') : '';
        next.pinHash = legacyPinDigest(sourcePin, next.pinSalt);
      }
      delete next.pin;

    function storageStatus(){
      try{
        const raw = JSON.stringify(state || {});
        const approxBytes = (raw.length || 0) * 2;
        const approxLimit = 5 * 1024 * 1024;
        const ratio = approxBytes / approxLimit;
        let level = 'ok';
        if(ratio >= 0.95) level = 'danger';
        else if(ratio >= 0.85) level = 'warn';
        else if(ratio >= 0.70) level = 'notice';
        return { approxBytes:approxBytes, approxLimit:approxLimit, ratio:ratio, level:level, percent:Math.min(100, Math.round(ratio * 100)) };
      }catch(e){
        return { approxBytes:0, approxLimit:5 * 1024 * 1024, ratio:0, level:'unknown', percent:0 };
      }
    }
    function storageWarningBanner(){
      const s = storageStatus();
      if(!s || s.level === 'ok' || s.level === 'unknown') return '';
      const cls = s.level === 'notice' ? ' info' : '';
      const msg = s.level === 'danger'
        ? 'Storage critically full. Export backup before more trading.'
        : (s.level === 'warn'
          ? 'Storage nearing capacity. Export backup soon.'
          : 'Storage usage rising. Keep backup current.');
      return '<div class="banner' + cls + '" style="margin-top:10px">' + esc(msg) + ' · Approx usage ' + esc(s.percent) + '%</div>';
    }

    function parseLiveNumber(value){
      if(value === undefined || value === null) return { raw:'', valid:false, number:'' };
      const raw = String(value);
      if(raw.trim() === '') return { raw:'', valid:false, number:'' };
      if(!/^\d*(\.\d*)?$/.test(raw)) return { raw:raw, valid:false, number:'' };
      if(raw === '.' || raw === '-.') return { raw:raw, valid:false, number:'' };
      const num = Number(raw);
      if(Number.isNaN(num)) return { raw:raw, valid:false, number:'' };
      return { raw:raw, valid:true, number:num };
    }

    function stockMovementBreakdown(ingredientId, locationId){
      const key = stockKey(ingredientId, locationId);
      const stockNow = round2(Number(state.stock[key] || 0));
      const breakdown = { opening:0, purchases:0, salesUsage:0, productionUsage:0, productionOutput:0, waste:0, stockTakeAdjustments:0, manual:0 };
      (state.movements || []).forEach(function(m){
        if(m.ingredientId !== ingredientId || m.locationId !== locationId) return;
        const qty = round2(Number(m.qty || 0));
        if(m.type === 'opening_balance') breakdown.opening += qty;
        else if(m.type === 'purchase_receipt') breakdown.purchases += qty;
        else if(m.type === 'sale_usage') breakdown.salesUsage += Math.abs(qty);
        else if(m.type === 'production_usage') breakdown.productionUsage += Math.abs(qty);
        else if(m.type === 'production_output') breakdown.productionOutput += qty;
        else if(m.type === 'waste') breakdown.waste += Math.abs(qty);
        else if(m.type === 'stock_take_adjustment') breakdown.stockTakeAdjustments += qty;
        else breakdown.manual += qty;
      });
      return { opening:round2(breakdown.opening), purchases:round2(breakdown.purchases), salesUsage:round2(breakdown.salesUsage), productionUsage:round2(breakdown.productionUsage), productionOutput:round2(breakdown.productionOutput), waste:round2(breakdown.waste), stockTakeAdjustments:round2(breakdown.stockTakeAdjustments), manual:round2(breakdown.manual), stockNow:stockNow };
    }

    function commitTransaction(type, payload){
      const tx = { transactionId:uid('tx'), createdAt:nowIso(), commitState:'pending', payload:{ type, payload }, actorUserId:session.currentUserId || '' };
      save(KEYS.pendingTx, tx);
      try{
        const draft = deepClone(state);
        if(txAlreadyApplied(draft, tx.transactionId)){
          localStorage.removeItem(KEYS.pendingTx);
          return { ok:true, tx, alreadyApplied:true };
        }
        applyTransactionMutation(draft, tx);
        tx.commitState = 'committed';
        draft.txLog = draft.txLog || [];
        draft.txLog.unshift(deepClone(tx));
        draft.txLog = draft.txLog.slice(0, 500);
        state = draft;
        save(KEYS.state, state);
        localStorage.removeItem(KEYS.pendingTx);
        persist();
        return { ok:true, tx };
      } catch(error){
        tx.commitState = 'failed';
        tx.error = String(error && error.message || error);
        save(KEYS.pendingTx, tx);
        console.error(error);
        if(error && error.code === 'STALE_ORDER'){
          openConflictModal(error.order, error.actionLabel);
          toast('Blocked stale write');
        } else if(error && error.code === 'STALE_STOCK_TAKE'){
          toast('Blocked stale stock take. Refresh the count and try again.');
        } else {
          toast('Transaction failed');
        }
        return { ok:false, error };
      }
    }

    function nodeChildPath(root, el){
      const path = [];
      let current = el;
      while(current && current !== root){
        const parent = current.parentElement;
        if(!parent) return null;
        path.unshift(Array.prototype.indexOf.call(parent.children, current));
        current = parent;
      }
      return current === root ? path : null;
    }

    function nodeFromChildPath(root, path){
      let current = root;
      for(let i = 0; current && i < (path || []).length; i += 1){
        current = current.children[path[i]] || null;
      }
      return current;
    }

    function captureFocusState(root){
      if(!root) return null;
      const active = document.activeElement;
      if(!active || !root.contains(active)) return null;
      const snap = {};
      if(active.id) snap.id = active.id;
      else {
        const childPath = nodeChildPath(root, active);
        if(childPath) snap.childPath = childPath;
      }
      if(!snap.id && !snap.childPath) return null;
      if(typeof active.selectionStart === 'number'){
        snap.selectionStart = active.selectionStart;
        snap.selectionEnd = active.selectionEnd;
        snap.selectionDirection = active.selectionDirection || 'none';
      }
      return snap;
    }

    function restoreFocusState(root, snap){
      if(!root || !snap) return;
      let el = null;
      if(snap.id) el = root.querySelector('#' + CSS.escape(snap.id));
      if(!el && snap.childPath) el = nodeFromChildPath(root, snap.childPath);
      if(!el || typeof el.focus !== 'function') return;
      el.focus({ preventScroll:true });
      if(typeof snap.selectionStart === 'number' && typeof el.setSelectionRange === 'function'){
        try{ el.setSelectionRange(snap.selectionStart, snap.selectionEnd, snap.selectionDirection || 'none'); }catch(_e){}
      }
    }

      const stillInPrep = queueable.some(function(line){ return !['ready','served','collected'].includes(line.stage); });
      return stillInPrep ? 'prepg' : 'prepd';
    }

      if(prepState === 'prepg') return { label:'prepg', pillClass:'pill-prepg' };
      if(prepState === 'prepd') return { label:'prepd', pillClass:'pill-prepd' };
      if(order.paymentStatus === 'paid') return { label:'paid', pillClass:'pill-paid' };
      if(order.paymentStatus !== 'paid' && orderPaymentAllowed(order)) return { label:'await pay', pillClass:'pill-await' };

      const policy = paymentTimingPolicyForOrder(order);
      if(policy === 'pay_before_complete_required' && orderPaymentAllowed(order) && order.paymentStatus !== 'paid'){
        return { label:'Pay', actionId:'openPay', kind:'primary' };

      if(isRunningBillContext(order.serviceContext) && order.paymentStatus !== 'paid'){
        return { label:'View', actionId:'viewOrder', kind:'ghost' };

      if(orderStageReady(order)){
        return { label:'Pay', actionId:'openPay', kind:'primary' };

      const locationId = stockLocationForBusinessUnit(order.businessUnit);
      const entries = [];
      ((order.lines || []).filter(isValidSaleLine)).forEach(function(line){
        if(!line.sourceIngredientId || Number(line.ingredientQty || 0) <= 0) return;
        const qty = line.pricingModeSnapshot === 'weighted' ? Number(line.capturedWeight || 0) * Number(line.qty || 1) * Number(line.ingredientQty || 1) : Number(line.qty || 1) * Number(line.ingredientQty || 1);
        entries.push({ id:uid('mv'), at:nowIso(), type:'sale_reversal', ingredientId:line.sourceIngredientId, locationId:line.sourceLocationId || locationId, qty:Math.abs(qty), referenceId:order.id, referenceLineId:line.id });
      });
      return entries;
    }

      const extras = ['Traditional','Drinks','Seafood','Combos','Platters','Pizzas','Light Meals','Sides'];

    }

          if(line.productId === productId) count += Number(line.qty || 1);
        });
      });
      return count;
    }

    function normalizedPriority(value, fallback){
      const num = Number(value);
      return Number.isFinite(num) ? num : (fallback === undefined ? 999 : fallback);
    }

    function compareByPriorityThenName(a,b, fallback){
      const aPriority = normalizedPriority(a && a.priority, fallback);
      const bPriority = normalizedPriority(b && b.priority, fallback);
      if(aPriority !== bPriority) return aPriority - bPriority;
      return String((a && a.name) || '').localeCompare(String((b && b.name) || ''));
    }

    function sortedProductsForSelection(items){
      return (items || []).slice().sort(function(a,b){
        const aPriority = normalizedPriority(a && a.priority, 999);
        const bPriority = normalizedPriority(b && b.priority, 999);
        if(aPriority !== bPriority) return aPriority - bPriority;
        const aPopular = a && a.isPopular ? 1 : 0;
        const bPopular = b && b.isPopular ? 1 : 0;
        if(bPopular !== aPopular) return bPopular - aPopular;
        const usageDiff = productUsageCount(b.id) - productUsageCount(a.id);
        if(usageDiff !== 0) return usageDiff;
        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    }

    function ingredientSelectionScore(item){
      if(!item) return 0;
      let score = 0;
      const lowRows = inventorySnapshotRows().filter(function(row){ return row.ingredientId === item.id && row.onHand <= row.reorderLevel; });
      score += lowRows.length * 100;
      (state.purchaseOrders || []).forEach(function(po){
        if(po.ingredientId === item.id){
          score += po.status === 'received' ? 8 : 20;
        }
      });
      (state.purchaseReceipts || []).forEach(function(rec){
        if(rec.ingredientId === item.id) score += 10;
      });
      (state.productionBatches || []).forEach(function(batch){
        if(batch.inputIngredientId === item.id) score += 18;
        if(batch.outputIngredientId === item.id) score += 14;
      });
      (state.stockMovements || []).forEach(function(mov){
        if(mov.ingredientId === item.id && ['sale_usage','production_usage','purchase_receipt','stock_take_adjustment','transfer_out','transfer_in'].includes(mov.type)) score += 1;
      });
      return score;
    }

    function sortedIngredientsForSelection(){
      return (state.ingredients || []).filter(function(item){ return item.active !== false; }).slice().sort(function(a,b){
        const aPriority = normalizedPriority(a && a.priority, 999);
        const bPriority = normalizedPriority(b && b.priority, 999);
        if(aPriority !== bPriority) return aPriority - bPriority;
        const scoreDiff = ingredientSelectionScore(b) - ingredientSelectionScore(a);
        if(scoreDiff !== 0) return scoreDiff;
        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    }

    function templateSelectionScore(item, type){
      if(!item) return 0;
      let score = 0;
      (state.productionBatches || []).forEach(function(batch){
        if(type === 'prep' && batch.recipeId === item.id) score += 20;
        if(type === 'portion' && batch.templateId === item.id) score += 20;
      });
      if(type === 'portion'){
        const lowRows = inventorySnapshotRows().filter(function(row){ return row.ingredientId === item.outputIngredientId && row.onHand <= row.reorderLevel; });
        score += lowRows.length * 60;
      }
      return score;
    }

    function sortedProductionTemplates(type){
      const list = type === 'prep' ? (state.prepRecipes || []) : (state.portionProductionTemplates || []);
      return list.slice().sort(function(a,b){
        const aPriority = normalizedPriority(a && a.priority, 999);
        const bPriority = normalizedPriority(b && b.priority, 999);
        if(aPriority !== bPriority) return aPriority - bPriority;
        const scoreDiff = templateSelectionScore(b, type) - templateSelectionScore(a, type);
        if(scoreDiff !== 0) return scoreDiff;
        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    }

    function biFilterMatches(isoValue){
      if(!isoValue) return false;
      const iso = String(isoValue).slice(0,10);
      const mode = ui.biFilter || 'today';
      const todayVal = todayKey();
      if(mode === 'today') return iso === todayVal;
      if(mode === 'week'){
        const now = new Date();
        const start = new Date(now); start.setDate(now.getDate() - 6);
        return iso >= start.toISOString().slice(0,10) && iso <= todayVal;
      }
      if(mode === 'month') return iso.slice(0,7) === todayVal.slice(0,7);
      if(mode === 'custom'){
        const from = ui.biDateFrom || '';
        const to = ui.biDateTo || '';
        if(from && iso < from) return false;
        if(to && iso > to) return false;
        return !!(from || to) ? true : iso === todayVal;
      }
      return true;
    }

    function managementBIData(derived){
      const orders = (derived.orders || []).filter(function(order){ return biFilterMatches(order.paidAt || order.updatedAt || order.createdAt); });
      const paid = orders.filter(function(order){ return order.paymentStatus === 'paid'; });
      const sales = round2(paid.reduce(function(sum, order){ return sum + Number(order.totalAmount || 0); }, 0));
      const byBu = {};
      const paymentMix = { cash:0, card:0, mobile:0, wallet:0, account:0, other:0 };
      paid.forEach(function(order){
        const bu = order.businessUnit || 'other';
        byBu[bu] = round2(Number(byBu[bu] || 0) + Number(order.totalAmount || 0));
        const method = String(order.paymentMethod || '').toLowerCase();
        if(Object.prototype.hasOwnProperty.call(paymentMix, method)) paymentMix[method] = round2(paymentMix[method] + Number(order.totalAmount || 0));
        else paymentMix.other = round2(paymentMix.other + Number(order.totalAmount || 0));
      });
      return {
        orders:orders,
        paid:paid,
        sales:sales,
        byBu:byBu,
        paymentMix:paymentMix,
        waste:(state.wasteLogs || []).filter(function(item){ return biFilterMatches(item.at || item.createdAt); }),
        batches:(state.productionBatches || []).filter(function(item){ return biFilterMatches(item.at || item.createdAt); }),
        receipts:(state.purchaseReceipts || []).filter(function(item){ return biFilterMatches(item.at || item.createdAt); }),
        wallet:(state.walletLedger || []).filter(function(item){ return biFilterMatches(item.at || item.createdAt); }),
        loyalty:(state.loyaltyLedger || []).filter(function(item){ return biFilterMatches(item.at || item.createdAt); }),
        shifts:(state.shifts || []).filter(function(item){ return biFilterMatches(item.closedAt || item.openedAt || item.createdAt); })
      };
    }

    function parseCsvText(text){

            field += '"';
            i++;
          } else if(ch === '"'){
            inQuotes = false;
          } else {
            field += ch;
          }
        } else {
          if(ch === '"'){
            inQuotes = true;
          } else if(ch === ','){
            row.push(field);
            field = '';
          } else if(ch === '\n'){
            row.push(field);
            if(row.some(function(cell){ return String(cell).trim() !== ''; })) rows.push(row);
            row = [];
            field = '';
          } else if(ch === '\r') {
          } else {

    function downloadTextFile(name, content, type){

      const a = document.createElement('a');
      a.href = url;

    function ensureCsvImportInput(){
      let input = document.getElementById('csv-import-input');
      if(input) return input;
      input = document.createElement('input');
      input.type = 'file';
      input.accept = '.csv,text/csv';
      input.id = 'csv-import-input';
      input.style.display = 'none';
      input.addEventListener('change', function(evt){
        const file = evt.target.files && evt.target.files[0];
        const section = input.getAttribute('data-section') || '';
        if(!file || !section) return;
        const reader = new FileReader();
        reader.onload = function(){
          try{
            applyCsvImport(section, String(reader.result || ''));
          } catch(error){
            toast(error && error.message ? error.message : 'CSV import failed');
            render();
          }
          input.value = '';
          input.removeAttribute('data-section');
        };
        reader.readAsText(file);
      });
      document.body.appendChild(input);
      return input;
    }

    function applyCsvImport(section, text){
      const def = csvDefinition(section);
      if(!def) throw new Error('Unknown CSV section');
      const parsed = parseCsvText(text);
      if(!parsed.rows.length) throw new Error('CSV has no data rows');
      if(def.importRows){
        const summary = def.importRows(parsed.rows);
        ensureExtendedState();
        persist();
        render();
        toast((def.label || section) + ' imported');
        return summary;
      }
      const list = Array.isArray(state[def.stateKey]) ? state[def.stateKey] : [];
      let created = 0, updated = 0, rejected = 0;
      parsed.rows.forEach(function(row){
        const item = def.normalize ? def.normalize(row) : row;
        if(!item || !item.id){ rejected++; return; }
        const idx = list.findIndex(function(existing){ return existing.id === item.id; });
        if(idx >= 0){ list[idx] = Object.assign({}, list[idx], item); updated++; }
        else { list.push(item); created++; }
      });
      state[def.stateKey] = list;
      ensureExtendedState();
      persist();
      render();
      toast((def.label || section) + ' import: ' + created + ' created, ' + updated + ' updated, ' + rejected + ' rejected');
      return { created:created, updated:updated, rejected:rejected };
    }

    function restaurantDemoRestockTargets(){
      function ensureDemoIngredient(seed){
        state.ingredients = Array.isArray(state.ingredients) ? state.ingredients : [];
        if(!(state.ingredients || []).some(function(item){ return item.id === seed.id; })) state.ingredients.push(seed);
      }
      ensureDemoIngredient({ id:'ing_chips_prep', name:'Chips Prep', category:'Other', baseUnit:'kg', reorderLevel:1 });
      ensureDemoIngredient({ id:'ing_sadza_prep', name:'Sadza Prep', category:'Other', baseUnit:'kg', reorderLevel:1 });
      ensureDemoIngredient({ id:'ing_stew_prep', name:'Stew Prep', category:'Other', baseUnit:'kg', reorderLevel:1 });
      const seeded = {
        ing_chicken_raw:{ locationId:'loc_d_door_freezer', targetQty:24 },
        ing_beef_tbone:{ locationId:'loc_butchery_freezer', targetQty:22 },
        ing_beef_stew:{ locationId:'loc_big_deep_freezer', targetQty:16 },
        ing_boerewors:{ locationId:'loc_butchery_display', targetQty:12 },
        ing_bream:{ locationId:'loc_butchery_freezer', targetQty:14 },
        ing_potato_chips:{ locationId:'loc_big_deep_freezer', targetQty:18 },
        ing_chilli:{ locationId:'loc_sauces_fridge', targetQty:4 },
        ing_gravy:{ locationId:'loc_sauces_fridge', targetQty:5 },
        ing_chips_prep:{ locationId:'loc_kitchen_fridge', targetQty:8 },
        ing_sadza_prep:{ locationId:'loc_kitchen_fridge', targetQty:10 },
        ing_stew_prep:{ locationId:'loc_kitchen_fridge', targetQty:8 },
        ing_cola:{ locationId:'loc_pepsi_shelf', targetQty:36 },
        ing_water:{ locationId:'loc_pepsi_shelf', targetQty:36 }
      };
      (state.products || []).filter(function(p){ return p.businessUnit === 'restaurant' && p.stockBehavior !== 'non_stock' && p.sourceIngredientId; }).forEach(function(product){
        if(!seeded[product.sourceIngredientId]){
          seeded[product.sourceIngredientId] = {
            locationId: ingredientLocationForProduct(product) || stockLocationForBusinessUnit('restaurant'),
            targetQty: Math.max(ingredientReorderLevel(getIngredientById(product.sourceIngredientId)) * 4, 8)
          };
        }
      });
      return Object.keys(seeded).map(function(ingredientId){ return { ingredientId:ingredientId, locationId:seeded[ingredientId].locationId, targetQty:seeded[ingredientId].targetQty }; });
    }

    function restaurantTrackedProducts(){
      return (state.products || []).filter(function(p){ return p.businessUnit === 'restaurant' && p.stockBehavior !== 'non_stock' && p.sourceIngredientId; });
    }

    function restaurantAllSoldOut(){
      const rows = restaurantTrackedProducts();
      if(!rows.length) return false;
      return rows.every(function(p){ return productStockStatus(p).status === 'out'; });
    }

    function autoReplenishRestaurantDemoIfNeeded(){
      try{
        if(ui.restaurantDemoStockReady) return;
        const targets = restaurantDemoRestockTargets();
        const restaurantNeedsSeed = restaurantAllSoldOut() || targets.some(function(t){ return totalStockQty(t.ingredientId) <= 0; });
        if(!restaurantNeedsSeed) { ui.restaurantDemoStockReady = true; return; }
        targets.forEach(function(t){
          const current = Number(state.stock[stockKey(t.ingredientId, t.locationId)] || 0);
          const next = Math.max(current, Number(t.targetQty || 0));
          state.stock[stockKey(t.ingredientId, t.locationId)] = round2(next);
        });
        state.movements = state.movements || [];
        state.movements.push({ id:uid('mov'), at:nowIso(), type:'demo_restock_auto', referenceId:'AUTO-RESTOCK', note:'Auto restaurant demo restock' });
        ui.restaurantDemoStockReady = true;
      }catch(err){ console.error(err); }
    }

function bulkReplenishRestaurantDemo(){
      const targets = restaurantDemoRestockTargets();
      const moves = [];
      targets.forEach(function(t){
        const current = Number(state.stock[stockKey(t.ingredientId, t.locationId)] || 0);
        const delta = round2(Number(t.targetQty || 0) - current);
        if(delta > 0){
          moves.push({ id:uid('mov'), at:nowIso(), type:'demo_restock', ingredientId:t.ingredientId, locationId:t.locationId, qty:delta, referenceId:'DEMO-RESTOCK' });
        }
      });

    function ensureAlertAudioContext(){
      if(alertAudioContext) return alertAudioContext;
      if(typeof window === 'undefined') return null;

      if(!Ctx) return null;
      alertAudioContext = new Ctx();
      return alertAudioContext;
    }

    function playToneSequence(tones, onDone){
      const ctx = ensureAlertAudioContext();
      if(!ctx){ if(onDone) onDone(); return; }
      const startAt = Math.max(ctx.currentTime + 0.01, ctx.currentTime);
      let cursor = startAt;
      tones.forEach(function(tone){
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = tone.type || 'sine';
        osc.frequency.value = Number(tone.freq || 880);
        gain.gain.setValueAtTime(0.0001, cursor);
        gain.gain.linearRampToValueAtTime(Number(tone.gain || 0.05), cursor + 0.01);
        gain.gain.linearRampToValueAtTime(0.0001, cursor + Number(tone.dur || 0.12));
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(cursor);
        osc.stop(cursor + Number(tone.dur || 0.12));
        cursor += Number(tone.dur || 0.12) + Number(tone.gap || 0.04);
      });
      if(typeof window !== 'undefined') window.setTimeout(function(){ if(onDone) onDone(); }, Math.max(120, Math.ceil((cursor - startAt) * 1000) + 40));
      else if(onDone) onDone();
    }

      if(evt.kind === 'ready'){
        return [
          { freq: base + 220, dur:0.10, gap:0.03, type:'triangle', gain:0.06 },
          { freq: base + 320, dur:0.14, gap:0.03, type:'triangle', gain:0.06 }
        ];
      }
      return [
        { freq: base, dur:0.09, gap:0.03, type:'square', gain:0.045 },
        { freq: base, dur:0.09, gap:0.03, type:'square', gain:0.045 }
      ];
    }

    function processAlertAudioQueue(){
      if(!session.currentUserId || !ui.soundEnabled || alertAudioBusy) return;
      const evt = nextPendingAlertEvent();
      if(!evt) return;
      alertAudioBusy = true;
      const ctx = ensureAlertAudioContext();
      const finish = function(){ markAlertPlayed(evt.id); alertAudioBusy = false; if(typeof window !== 'undefined') window.setTimeout(processAlertAudioQueue, 80); };
      if(ctx && ctx.state === 'suspended' && ctx.resume){
        Promise.resolve(ctx.resume()).then(function(){ playToneSequence(tonesForAlertEvent(evt), finish); }).catch(function(){ finish(); });
        return;

      playToneSequence(tonesForAlertEvent(evt), finish);
    }

    function filteredPurchaseRows(){
      const category = String(ui.purchaseCategory || 'All');
      const search = String(ui.purchaseSearch || '').toLowerCase().trim();
      return sortedIngredientsForSelection().filter(function(item){
        if(category !== 'All' && String(item.category || '') !== category) return false;
        if(search){
          const hay = (String(item.name || '') + ' ' + String(item.category || '')).toLowerCase();
          if(hay.indexOf(search) < 0) return false;

    function purchaseDraftFor(ingredientId){
      if(!ui.purchaseDraftRows || typeof ui.purchaseDraftRows !== 'object') ui.purchaseDraftRows = {};
      const existing = ui.purchaseDraftRows[ingredientId] || {};
      return {
        qty: existing.qty === undefined ? '' : String(existing.qty),
        cost: existing.cost === undefined ? '' : String(existing.cost)
      };
    }

    function purchaseDraftEntries(){
      return filteredPurchaseRows().map(function(item){
        const draft = purchaseDraftFor(item.id);
        const qty = parseLiveNumber(draft.qty);
        const cost = parseLiveNumber(draft.cost);
        return {
          ingredientId:item.id,
          ingredient:item,
          qtyRaw:draft.qty,
          costRaw:draft.cost,
          qtyValid:qty.valid && qty.number > 0,
          costValid:cost.valid && cost.number >= 0,
          qty: qty.valid ? round2(qty.number) : 0,
          cost: cost.valid ? round2(cost.number) : 0
        };
      }).filter(function(row){ return row.qtyValid; });

      const derived = deriveState(state, ui);

      const paidSales = round2(paidOrders.reduce(function(sum, order){ return sum + Number(order.totalAmount || 0); }, 0));
      const unpaidSales = round2(derived.unpaidOrders.reduce(function(sum, order){ return sum + Number(order.totalAmount || 0); }, 0));

      const walletCredits = round2((state.walletLedger || []).reduce(function(sum, entry){ return sum + Number(entry.amount || 0); }, 0));
      const inventoryRows = inventorySnapshotRows().slice().sort(function(a,b){
        const aScore = ingredientSelectionScore(getIngredientById(a.ingredientId) || {id:a.ingredientId});
        const bScore = ingredientSelectionScore(getIngredientById(b.ingredientId) || {id:b.ingredientId});
        return bScore !== aScore ? bScore - aScore : String(a.ingredientName || '').localeCompare(String(b.ingredientName || ''));
      });

function transferCategoryOptions(){
      const seen = new Set(['All']);
      const ordered = ['All'];
      (state.ingredients || []).forEach(function(item){
        const category = String(item.category || '').trim();
        if(category && !seen.has(category)){
          seen.add(category);
          ordered.push(category);
        }
      });
      return ordered;
    }

    function currentTransferRows(){
      const fromId = ui.transferFromLocationId || '';
      const toId = ui.transferToLocationId || '';
      const term = String(ui.transferSearch || '').trim().toLowerCase();
      return sortedIngredientsForSelection().filter(function(item){
        if(!item || !item.id) return false;
        if(fromId && toId && fromId === toId) return false;
        const qty = currentStockQty(item.id, fromId);
        if(!(qty > 0)) return false;
        const category = String(item.category || '').trim();
        if((ui.transferCategory || 'All') !== 'All' && category !== ui.transferCategory) return false;
        if(term){
          const hay = (String(item.name || '') + ' ' + category + ' ' + String(item.baseUnit || '')).toLowerCase();
          if(hay.indexOf(term) < 0) return false;
        }
        return true;
      }).map(function(item){
        return {
          ingredientId:item.id,
          ingredientName:item.name,
          category:item.category,
          baseUnit:item.baseUnit || 'units',
          onHand:round2(currentStockQty(item.id, fromId))
        };
      });
    }

    function currentTransferReceiveRows(){
      const term = String(ui.transferSearch || '').trim().toLowerCase();
      return (state.transferLogs || []).filter(function(log){
        if(ui.transferToLocationId && log.toLocationId !== ui.transferToLocationId) return false;
        if(ui.transferFromLocationId && ui.transferFromLocationId !== 'all' && log.fromLocationId !== ui.transferFromLocationId) return false;
        const ingredient = getIngredientById(log.ingredientId) || {};
        if((ui.transferCategory || 'All') !== 'All' && String(ingredient.category || '') !== ui.transferCategory) return false;
        if(term){
          const hay = (String(ingredient.name || '') + ' ' + String(ingredient.category || '')).toLowerCase();
          if(hay.indexOf(term) < 0) return false;
        }
        return true;
      }).slice(0,40);
    }

    function transferDraftQty(ingredientId){
      return round2(Number((ui.transferDraft || {})[ingredientId] || 0));
    }

    function setTransferDraftQty(ingredientId, value){
      if(!ui.transferDraft || typeof ui.transferDraft !== 'object') ui.transferDraft = {};
      const parsed = round2(Number(value || 0));
      const available = currentStockQty(ingredientId, ui.transferFromLocationId);
      if(!(parsed > 0)) delete ui.transferDraft[ingredientId];
      else ui.transferDraft[ingredientId] = Math.min(parsed, available);
      persist();
      render();
    }

    function bumpTransferDraft(ingredientId, delta){
      const ingredient = getIngredientById(ingredientId) || {};
      const step = ingredient.baseUnit === 'unit' ? 1 : 0.5;
      const next = round2(transferDraftQty(ingredientId) + (delta * step));
      setTransferDraftQty(ingredientId, next);
    }

    
    function inventoryVerifyMessage(){
      const mode = ui.stockTakeMode || 'count';
      const rows = currentStockTakeRows().filter(function(r){ return r.countedQty !== ''; });
      if(!ui.stockTakeLocationId) return 'Choose location first';
      if(!rows.length) return mode === 'opening' ? 'Enter at least one opening balance' : 'Enter at least one count';
      return '';
    }
    function verifyStockTakeSheet(){
      const blocker = inventoryVerifyMessage();
      if(blocker){ toast(blocker); return; }
      ui.inventoryTab = 'stock_take';
      ui.stockTakeViewMode = 'sheet';
      persist();
      render();
      toast('Inventory verified. Review and submit.');
    }

    function transferVerifyMessage(){
      const draft = ui.transferDraft || {};
      const rows = Object.keys(draft).map(function(id){ return { ingredientId:id, qty:round2(Number(draft[id] || 0)) }; }).filter(function(row){ return row.qty > 0; });
      if(!rows.length) return 'Choose transfer quantities first';
      if(!ui.transferFromLocationId || !ui.transferToLocationId) return 'Choose both locations';
      if(ui.transferFromLocationId === ui.transferToLocationId) return 'Source and destination must differ';
      for(var i=0;i<rows.length;i+=1){
        var row = rows[i];
        var available = currentStockQty(row.ingredientId, ui.transferFromLocationId);
        if(row.qty > available) return 'Some rows exceed source on hand';
      }
      return '';
    }
    function verifyTransferSheet(){
      const blocker = transferVerifyMessage();
      if(blocker){ toast(blocker); return; }
      ui.transferMode = 'receive';
      persist();
      render();
      toast('Transfer verified. Review and submit.');
    }

    function wasteVerifyMessage(){
      const ingredientId = ui.wasteIngredientId;
      const locationId = ui.wasteLocationId;
      const parsed = parseLiveNumber(ui.wasteQty);
      if(!ingredientId) return 'Choose waste item first';
      if(!locationId) return 'Choose waste location first';
      if(!parsed.valid || parsed.number <= 0) return 'Enter a valid waste quantity';
      const available = currentStockQty(ingredientId, locationId);
      if(parsed.number > available) return 'Waste quantity exceeds on hand';
      return '';
    }
    function verifyWasteSheet(){
      const blocker = wasteVerifyMessage();
      if(blocker){ toast(blocker); return; }
      toast('Waste verified. Review and submit.');
    }
    function focusWasteQty(){
      try{
        var el = document.getElementById('waste-qty-input');
        if(el){ el.focus(); el.select && el.select(); }
      }catch(e){}
    }
    function openWasteMore(){
      openActionSheet({ title:'Waste', actions:[
        {label:'Open In/Out Ledger', actionId:'openLedger'},
        {label:'Open Purchases', actionId:'openPurchases'},
        {label:'Open Supervisor Dashboard', actionId:'openSupervisorDailyInventory'}
      ]});
    }

    function submitTransferSheet(){
      const draft = ui.transferDraft || {};
      const rows = Object.keys(draft).map(function(id){ return { ingredientId:id, qty:round2(Number(draft[id] || 0)) }; }).filter(function(row){ return row.qty > 0; });
      if(!rows.length){ toast('Choose transfer quantities first'); return; }
      if(!session.currentUserId || !currentUser()){ toast('Active user required'); return; }
      if(!ui.transferFromLocationId || !ui.transferToLocationId){ toast('Choose both locations'); return; }
      if(ui.transferFromLocationId === ui.transferToLocationId){ toast('Source and destination must differ'); return; }
      for(var i=0;i<rows.length;i+=1){
        var row = rows[i];
        var available = currentStockQty(row.ingredientId, ui.transferFromLocationId);
        if(row.qty > available){ toast('Some rows exceed source on hand'); return; }
      }
      var posted = 0;
      rows.forEach(function(row){
        const transferId = uid('trn');
        const log = { id:transferId, at:nowIso(), ingredientId:row.ingredientId, fromLocationId:ui.transferFromLocationId, toLocationId:ui.transferToLocationId, qty:round2(row.qty), note:ui.transferNote || '', actorUserId:session.currentUserId || '' };
        const movements = [
          { id:uid('mov'), at:nowIso(), type:'transfer_out', ingredientId:row.ingredientId, locationId:ui.transferFromLocationId, qty:round2(-row.qty), referenceId:transferId, note:ui.transferNote || '' },
          { id:uid('mov'), at:nowIso(), type:'transfer_in', ingredientId:row.ingredientId, locationId:ui.transferToLocationId, qty:round2(row.qty), referenceId:transferId, note:ui.transferNote || '' }
        ];
        const res = commitTransaction('stock_transfer', { transferLog:log, movements:movements });
        if(res && res.ok) posted += 1;
      });
      if(posted){
        ui.transferDraft = {};
        ui.transferSearch = '';
        ui.transferQuickItemId = '';
        persist();
        render();
        toast(posted + ' transfer row' + (posted === 1 ? '' : 's') + ' posted');
      }
    }

    function buildOrderTxPayload(){
      const totals = orderTotalsFromCart();
      if(!totals.validLines.length) return null;
      const displayRef = ui.contextRef || generateDisplayRef(ui.serviceContext);
      const locationId = stockLocationForBusinessUnit(ui.posBusinessUnit);
      const now = nowIso();
      if(ui.workingOrderId){
        const existing = ((state.orders || []).find(function(o){ return o.id === ui.workingOrderId; }));
        if(!existing) return null;
        const amendmentRound = ((existing.lines || []).reduce(function(max,line){ return Math.max(max, Number(line.amendmentRound || 1)); }, 1)) + 1;
        const lines = deepClone(totals.validLines).map(function(line, index){
          return Object.assign({}, line, {
            stage: lineSendStage(line),
            sentAt: now,
            firedAt: now,
            isAmendment:true,
            amendmentRound: amendmentRound,
            amendmentSequence:index + 1,
            amendmentOfOrderId: existing.id
          });
        });
        const movements = [];
        lines.forEach(function(line){ stockMovementEntriesForLine(line, existing.id, locationId).forEach(function(m){ movements.push(m); }); });
        return { type:'order_amend', payload:{ orderId:existing.id, expectedRowVersion:Number(ui.workingOrderExpectedRowVersion || existing.rowVersion || 0), amendmentRound:amendmentRound, lines:lines, movements:movements } };
      }
      const built = buildNewOrderRecordFromCart({ paymentStatus:'unpaid', customerId:ui.selectedCustomerId || '' });
      if(!built) return null;
      return { type:'order_send', payload:{ order:built.order, movements:built.movements } };
    }

    function openOrderAsNewRound(orderId, rowVersion){
      if(!requireOpenShiftForSales('open a new round')) return;
      const order = getFreshOrder(orderId, rowVersion, 'Open bill');
      if(!order) return;
      if(order.paymentStatus === 'paid'){
        toast('Paid orders cannot be reopened for new rounds');
        return;
      }
      ui.pendingPaymentOrderId = '';
      ui.pendingPaymentExpectedRowVersion = null;
      ui.workingOrderId = order.id;
      ui.workingOrderExpectedRowVersion = Number(order.rowVersion || 0);
      ui.serviceContext = order.serviceContext;
      ui.contextRef = order.displayRef;
      ui.tableContextId = order.tableId || '';
      ui.posBusinessUnit = order.businessUnit;
      ui.currentCustomerRef = order.customerRef || '';
      ui.selectedCustomerId = order.customerId || '';
      ui.saveChangeToWallet = false;
      ui.compactContextOpen = false;
      ui.cart = [];
      ui.view = 'pos';
      toast('Opened ' + order.displayRef + ' for a new round');

    function applyTransactionMutation(draft, tx){
      // Safety: ensure all critical arrays exist in draft before any mutation
      ['orders','audit','txLog','movements','stockTakeReports','purchaseOrders',
       'purchaseReceipts','wasteLogs','productionBatches','walletLedger','loyaltyLedger',
       'transferLogs','alertEvents','macdEntries','shifts','kdsTickets'].forEach(function(k){
        if(!Array.isArray(draft[k])) draft[k] = [];
      });
      if(!draft.stock || typeof draft.stock !== 'object') draft.stock = {};
      if(!Array.isArray(draft.tables)) draft.tables = [];
      const type = tx && tx.payload && tx.payload.type;
      const payload = tx && tx.payload && tx.payload.payload || {};
      function syncLegacyTableState(orderRecord, occupied){
        if(!orderRecord || !orderRecord.tableId) return;
        const liveTableId = String(orderRecord.tableId);
        draft.tables = Array.isArray(draft.tables) ? draft.tables : [];
        let table = draft.tables.find(function(item){ return String(item.id) === liveTableId || String(item.name) === liveTableId; });
        if(!table){
          table = { id:liveTableId, name:liveTableId, status:'available', orderId:null, occupiedAt:null };
          draft.tables.push(table);
        }
        if(occupied){
          table.status = 'occupied';
          table.orderId = orderRecord.id;
          table.occupiedAt = table.occupiedAt || nowIso();
          draft.audit.unshift({ id:uid('aud'), at:nowIso(), type:'TABLE_OCCUPIED', actorUserId:session.currentUserId, detail:{ tableId:liveTableId, orderId:orderRecord.id, displayRef:orderRecord.displayRef } });
        } else {
          table.status = 'available';

    function saveTransfer(){
      const qty = Number(ui.transferQty || 0);
      if(!ui.transferIngredientId){ toast('Choose an item first'); return; }
      if(!ui.transferFromLocationId || !ui.transferToLocationId){ toast('Choose both locations'); return; }
      if(ui.transferFromLocationId === ui.transferToLocationId){ toast('Source and destination must differ'); return; }
      if(!(qty > 0)){ toast('Enter a valid transfer qty'); return; }
      const available = currentStockQty(ui.transferIngredientId, ui.transferFromLocationId);
      if(qty > available){ toast('Transfer qty exceeds source on hand'); return; }
      const transferId = uid('trn');
      const log = { id:transferId, at:nowIso(), ingredientId:ui.transferIngredientId, fromLocationId:ui.transferFromLocationId, toLocationId:ui.transferToLocationId, qty:round2(qty), note:ui.transferNote || '', actorUserId:session.currentUserId || '' };
      const movements = [
        { id:uid('mov'), at:nowIso(), type:'transfer_out', ingredientId:ui.transferIngredientId, locationId:ui.transferFromLocationId, qty:round2(-qty), referenceId:transferId, note:ui.transferNote || '' },
        { id:uid('mov'), at:nowIso(), type:'transfer_in', ingredientId:ui.transferIngredientId, locationId:ui.transferToLocationId, qty:round2(qty), referenceId:transferId, note:ui.transferNote || '' }
      ];
      const res = commitTransaction('stock_transfer', { transferLog:log, movements:movements });
      if(!res || !res.ok) return;
      ui.transferQty = '';
      ui.transferNote = '';
      toast('Transfer posted');
      render();
    }

    function payOrder(orderId, settlementMode){
      const derived = deriveState(state, ui);
      const order = findPaymentOrder(derived);
      if(!order || !order.validLines.length){ toast('Nothing to pay'); return; }
      if(ui.pendingPaymentKind !== 'cart' && !orderPaymentAllowed(order)){ toast('This order is not eligible for payment yet'); return; }
      if(!ui.paymentMethod){ toast('Choose a payment method first'); return; }
      const totalDue = Number(order.totalAmount || 0);
      const customerId = ui.paymentCustomerId || order.customerId || ui.selectedCustomerId || '';
      const paymentAccountCustomerId = ui.paymentAccountCustomerId || '';
      const tenderedParsed = parseLiveNumber(ui.paymentCashTendered);
      let tenderedAmount = ui.paymentMethod === 'cash' ? (tenderedParsed.valid ? tenderedParsed.number : totalDue) : totalDue;
      if(ui.paymentMethod === 'cash' && tenderedAmount < totalDue){ toast('Cash tendered is below total due'); return; }
      let walletRedeemedAmount = 0;
      if(ui.paymentMethod === 'wallet'){
        if(!customerId){ toast('Choose customer for wallet payment'); return; }
        const available = customerWalletBalance(customerId);
        if(available < totalDue){ toast('Wallet balance is below total due'); return; }
        tenderedAmount = totalDue;
        walletRedeemedAmount = totalDue;
      }
      if(ui.paymentMethod === 'account'){
        if(!paymentAccountCustomerId){ toast('Choose an internal account first'); return; }
        tenderedAmount = totalDue;
      }
      const changeAmount = round2(Math.max(0, tenderedAmount - totalDue));
      if(ui.paymentMethod === 'cash' && changeAmount > 0 && settlementMode !== 'cash_change' && settlementMode !== 'wallet_change'){
        ui.changeResolutionModal = { orderId:orderId || '', changeAmount:changeAmount, customerId:customerId || '', paymentMethod:ui.paymentMethod };
        render();
        return;
      }
      const walletSavedAmount = (ui.paymentMethod === 'cash' && changeAmount > 0 && customerId && settlementMode === 'wallet_change') ? changeAmount : 0;
      if(ui.pendingPaymentKind === 'cart'){
        const built = buildNewOrderRecordFromCart({ paymentStatus:'paid', paymentMethod:ui.paymentMethod, tenderedAmount:tenderedAmount, changeAmount:changeAmount, walletSavedAmount:walletSavedAmount, walletRedeemedAmount:walletRedeemedAmount, customerId:customerId, paymentAccountCustomerId:paymentAccountCustomerId });
        if(!built){ toast('Nothing valid to pay'); return; }
        const res = commitTransaction('order_prepay_send', { order:built.order, movements:built.movements, walletSavedAmount:walletSavedAmount, walletRedeemedAmount:walletRedeemedAmount, customerId:customerId, paymentAccountCustomerId:paymentAccountCustomerId });
        if(res.ok){
          toast(walletRedeemedAmount > 0 ? 'Paid and sent · wallet redeemed' : (walletSavedAmount > 0 ? 'Paid and sent · change saved to wallet' : 'Paid and sent'));
          resetCartDraft();
          ui.pendingPaymentKind = '';
          ui.pendingPaymentOrderId = '';
          ui.pendingPaymentExpectedRowVersion = null;
          ui.paymentCustomerId = '';
          ui.paymentMethod = '';
          ui.paymentAccountCustomerId = '';
          ui.paymentCashTendered = '';
          ui.saveChangeToWallet = false;
          ui.activeBucket = 'all';
          persist();
          render();
        }
        return;

        };
        const usageMovement = { id:uid('mov'), at:batch.at, type:'production_usage', ingredientId:template.inputIngredientId, locationId:template.inputLocationId, qty:-Math.abs(round2(inputParsed.number)), referenceId:batch.id };
        const outputMovement = { id:uid('mov'), at:batch.at, type:'production_output', ingredientId:template.outputIngredientId, locationId:template.outputLocationId, qty:round2(portionParsed.number), referenceId:batch.id };
        const res = commitTransaction('production_post', { batch:batch, movements:[usageMovement, outputMovement] });
        if(res.ok){
          ui.prodInputQty = '';

          ui.prodOutputWeight = '';
          ui.prodYieldNote = '';
          ui.prodNote = '';

      if(!actualParsed.valid || actualParsed.number <= 0){ toast('Enter a valid actual batch quantity'); return; }
      const batch = {
        id:uid('bat'),
        at:nowIso(),
        batchType:'prep',
        recipeId:recipe.id,
        recipeName:recipe.name,
        inputIngredientId:recipe.inputIngredientId,
        outputIngredientId:recipe.outputIngredientId,
        inputLocationId:recipe.inputLocationId,
        outputLocationId:recipe.outputLocationId,
        inputQty:round2(Number(recipe.defaultInputQty || 0)),
        inputUnit:'kg',
        expectedQty:expectedParsed.valid ? round2(expectedParsed.number) : round2(Number(recipe.defaultExpectedQty || 0)),
        actualQty:round2(actualParsed.number),
        outputUnit:recipe.outputUnit || 'kg',

        packageQtySnapshot:recipe.packageQty || '',
        packageUnitSnapshot:recipe.packageUnit || '',

        note:(ui.prodNote || '').trim()
      };
      const usageMovement = { id:uid('mov'), at:batch.at, type:'production_usage', ingredientId:recipe.inputIngredientId, locationId:recipe.inputLocationId, qty:-Math.abs(round2(Number(recipe.defaultInputQty || 0))), referenceId:batch.id };
      const outputMovement = { id:uid('mov'), at:batch.at, type:'production_output', ingredientId:recipe.outputIngredientId, locationId:recipe.outputLocationId, qty:round2(actualParsed.number), referenceId:batch.id };
      const res = commitTransaction('production_post', { batch:batch, movements:[usageMovement, outputMovement] });

        ui.prodExpectedQty = '';
        ui.prodNote = '';

    // PHASE 0 COMPLETE: PAYMENT STATE MACHINE
    // ══════════════════════════════════════════════════════════════════════════════
    
    function validatePaymentEligibility(order) {
      if (!order) return { valid: false, reason: 'Order not found' };
      if (!order.validLines || order.validLines.length === 0) {
        return { valid: false, reason: 'No items in order' };
      }
      if (order.paymentStatus === 'paid') {
        return { valid: false, reason: 'Already paid' };
      }
      const currentShift = currentOpenShift();
      if (!currentShift) {
        promptOpenTradingDay('process payment');
        return { valid: false, reason: 'Trading Day closed. Open Trading Day to process payment.' };
      }
      return { valid: true };
    }
    
    function initiatePayment(orderId, method, amount) {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return { ok: false, error: 'Order not found' };
      const validation = validatePaymentEligibility(order);
      if (!validation.valid) return { ok: false, error: validation.reason };
      order.paymentStatus = 'pending';
      order.paymentMethod = method;
      order.paymentInitiatedAt = nowIso();
      order.rowVersion = (Number(order.rowVersion || 0) + 1);
      addAudit('PAYMENT_INITIATED', { orderId: order.id, method: method, amount: amount, status: 'pending' });
      persist();
      return { ok: true, order: order };
    }
    
    function approvePayment(orderId, tenderedAmount, changeAmount, method) {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return { ok: false, error: 'Order not found' };
      if (order.paymentStatus !== 'pending') return { ok: false, error: 'Payment must be in pending state' };
      order.paymentStatus = 'approved';
      order.tenderedAmount = tenderedAmount;
      order.changeAmount = changeAmount;
      order.paidAt = nowIso();
      order.rowVersion = (Number(order.rowVersion || 0) + 1);
      addAudit('PAYMENT_APPROVED', { orderId: order.id, method: method, tenderedAmount: tenderedAmount, changeAmount: changeAmount });
      persist();
      return { ok: true, order: order };
    }
    
    function completePayment(orderId) {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return { ok: false, error: 'Order not found' };
      if (order.paymentStatus !== 'approved') return { ok: false, error: 'Payment must be approved first' };
      order.paymentStatus = 'paid';
      order.completedAt = nowIso();
      order.rowVersion = (Number(order.rowVersion || 0) + 1);
      if (['floor_table','butchery_braai_table','bar_seat'].includes(order.serviceContext) && order.tableId) {
        releaseTableAfterPayment(order.tableId, orderId);
      }
      addAudit('PAYMENT_COMPLETED', { orderId: order.id, totalAmount: order.totalAmount, changeAmount: order.changeAmount });
      persist();
      return { ok: true, order: order };
    }
    
    function refundPayment(orderId, reason) {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return { ok: false, error: 'Order not found' };
      if (order.paymentStatus !== 'paid') return { ok: false, error: 'Can only refund paid orders' };
      order.paymentStatus = 'refunded';
      order.refundReason = reason;
      order.refundedAt = nowIso();
      order.rowVersion = (Number(order.rowVersion || 0) + 1);
      if (['floor_table','butchery_braai_table','bar_seat'].includes(order.serviceContext) && order.tableId) releaseTableAfterPayment(order.tableId, orderId);
      addAudit('PAYMENT_REFUNDED', { orderId: order.id, reason: reason, amount: order.totalAmount });
      persist();
      return { ok: true, order: order };
    }

    function kdsTicketSnapshotsFromOrders() {
      const tickets = [];
      (state.orders || []).forEach(function(order){
        (order.lines || []).forEach(function(line){
          if(!isValidSaleLine(line)) return;
          if(!isQueueableLine(line)) return;
          const stageMap = { sent:'waiting', cooking:'in_prep', ready:'ready', served:'completed', collected:'completed' };
          tickets.push({
            id: 'kds_' + String(order.id || '') + '_' + String(line.id || ''),
            orderId: order.id,
            lineId: line.id,
            productName: line.productNameSnapshot || line.name || '',
            quantity: Number(line.qty || 0),
            specialInstructions: line.specialInstructions || '',
            stage: stageMap[line.stage] || 'waiting',
            createdAt: line.sentAt || order.createdAt || '',
            startedAt: line.stage === 'cooking' ? (line.updatedAt || order.updatedAt || '') : null,
            readyAt: line.stage === 'ready' ? (line.updatedAt || order.updatedAt || '') : null,
            completedAt: ['served','collected'].includes(line.stage) ? (line.updatedAt || order.updatedAt || '') : null,
            rowVersion: Number(order.rowVersion || 0)
          });
        });
      });
      return tickets;
    }

    function initializeKdsTickets() {
      if (Array.isArray(state.kdsTickets) && state.kdsTickets.length) {
        state.kdsTickets = [];
        persist();
      }
    }

    function createKdsTicket(orderId, lineId) {
      return kdsTicketSnapshotsFromOrders().find(function(ticket){
        return ticket.orderId === orderId && ticket.lineId === lineId;
      }) || null;
    }

    function advanceKdsTicket(ticketId, newStage) {
      const ticket = kdsTicketSnapshotsFromOrders().find(function(item){ return item.id === ticketId; });
      if (!ticket) return { ok: false, error: 'Ticket not found' };
      const orderStageMap = { waiting:'sent', in_prep:'cooking', ready:'ready', completed:'served' };
      const nextStage = orderStageMap[newStage] || '';
      if(!nextStage) return { ok:false, error:'Invalid stage transition' };
      const order = (state.orders || []).find(function(item){ return item.id === ticket.orderId; });
      if(!order) return { ok:false, error:'Order not found' };
      const result = commitTransaction('kds_stage', { orderId:ticket.orderId, lineId:ticket.lineId, nextStage:nextStage, expectedRowVersion:Number(order.rowVersion || 0) });
      return result.ok ? { ok:true, ticket:createKdsTicket(ticket.orderId, ticket.lineId) } : { ok:false, error:'Stage update failed' };
    }

    function getKdsTicketsByStage(stage) { return kdsTicketSnapshotsFromOrders().filter(function(t){ return t.stage === stage; }); }
    function getKdsTicketsByOrder(orderId) { return kdsTicketSnapshotsFromOrders().filter(function(t){ return t.orderId === orderId; }); }
    function getPendingKdsTickets() { return kdsTicketSnapshotsFromOrders().filter(function(t){ return t.stage !== 'completed'; }); }

        'manager': ['pos', 'kds', 'inventory', 'reports', 'accounts'],
        'chef': ['kds', 'reports'],

        'cashier': ['pos', 'inventory', 'accounts', 'reports']
      };
      const allowedViews = rolePermissions[user.role] || [];
      return allowedViews.includes(viewName);

    function formatReceiptText(order) {
      const company = state.settings || {};
      const companyName = company.companyName || 'Restaurant';
      const currency = company.currencyCode || company.currency || 'USD';
      let receipt = '\n========================================\n';
      receipt += companyName + '\n';
      receipt += 'Currency: ' + currency + '\n';
      receipt += 'Order ' + (order.displayRef || order.id) + '\n';
      receipt += new Date(order.createdAt).toLocaleString() + '\n';
      receipt += '========================================\n\n';
      receipt += 'ITEMS\n';
      receipt += '----------------------------------------\n';
      (order.lines || []).forEach(function(line) {
        const product = getProductById(line.productId);
        const productName = product ? product.name : '[Unknown]';
        const itemTotal = (line.quantity * line.unitPrice).toFixed(2);
        receipt += productName + ' x' + line.quantity + '\n';
        receipt += '  ' + line.unitPrice + ' × ' + line.quantity + ' = ' + itemTotal + '\n';
      });
      receipt += '\n----------------------------------------\n';
      receipt += 'Subtotal:    ' + (order.subtotalAmount || 0).toFixed(2) + '\n';
      if (order.taxAmount > 0) {
        receipt += 'Tax: ' + order.taxAmount.toFixed(2) + '\n';
      }
      receipt += 'Total:       ' + (order.totalAmount || 0).toFixed(2) + '\n';
      receipt += 'Tendered:    ' + (order.tenderedAmount || 0).toFixed(2) + '\n';
      receipt += 'Change:      ' + (order.changeAmount || 0).toFixed(2) + '\n';
      receipt += 'Method:      ' + (order.paymentMethod || 'N/A') + '\n';
      receipt += '\n========================================\n';
      receipt += 'Thank you for your business!\n\n';
      return receipt;
    }
    
    function printReceiptText(orderId) {
      const order = state.orders.find(function(o) { return o.id === orderId; });

        const printWindow = window.open('', '', 'width=400,height=600');
        printWindow.document.write('<pre style="font-family: monospace; font-size: 12px;">' + receiptText.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>');
        printWindow.document.close();
        printWindow.print();
        printWindow.close();
        addAudit('RECEIPT_PRINTED', { orderId: orderId, totalAmount: order.totalAmount });
        return { ok: true, receipt: receiptText };
      } catch (e) {
        return { ok: false, error: 'Print failed' };

          ? '<div class="banner info">Type at least 2 letters. Then tap the bulk-prep item.</div>'
          : (matches.length
              ? '<div class="stack">' + matches.map(function(row){ return '<button class="ghost-btn" style="justify-content:space-between;text-align:left" onclick="App.chooseProductionSearchItem(&quot;' + esc(row.id) + '&quot;)"><span>' + esc(row.name) + '</span><span class="tiny muted">' + esc(row.portionUnit || 'portion') + '</span></button>'; }).join('') + '</div>'
              : '<div class="empty">No matching items. Try different letters.</div>');
        return '<div><div class="modal-backdrop" onclick="App.closeProductionSearchModal()"></div><div class="modal-wrap"><div class="modal stack"><div class="row between"><div><h3>Find bulk-prep item</h3><div class="subtitle">Filter by 2 or more letters, then jump to the correct bulk-prep row.</div></div><button class="icon-btn" onclick="App.closeProductionSearchModal()">✕</button></div><div class="field"><label>Search letters</label><input type="text" autocapitalize="off" autocomplete="off" value="' + esc(m.term || '') + '" oninput="App.setProductionSearchTerm(this.value)" placeholder="type 2 letters" /></div>' + list + '<div class="row"><button class="ghost-btn" onclick="App.clearProductionSearchFilter()">Show all items</button><button class="primary-btn" onclick="App.closeProductionSearchModal()">Close</button></div></div></div></div>';
      }

  })();
  </script>
</body>
</html>
